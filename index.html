<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wegweiser Lernzieldifferenz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              primary: '#2563eb', // blue-600
              secondary: '#64748b', // slate-500
              success: '#10b981', // emerald-500
              warning: '#f59e0b', // amber-500
              danger: '#ef4444', // red-500
            },
            animation: {
              'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1)',
              'float': 'float 3s ease-in-out infinite',
              'bounce-slow': 'bounce 2s infinite',
              'run-wild': 'runWild 8s linear infinite',
              'throw-paper': 'throwPaper 2s ease-out infinite',
              'chair-tip': 'chairTip 2.5s ease-in-out infinite',
              'head-bob': 'headBob 1s ease-in-out infinite',
              'write-hand': 'writeHand 0.5s ease-in-out infinite',
              'breathe': 'breathe 4s ease-in-out infinite',
              'eyes-move': 'eyesMove 3s steps(1) infinite',
              'grow-up': 'growUp 1s ease-out forwards',
              'bloom': 'bloom 0.8s ease-out forwards',
              'sway': 'sway 3s ease-in-out infinite',
              'water-pour': 'waterPour 2s infinite',
              'scale-wobble': 'scaleWobble 4s ease-in-out infinite',
              'drop-in': 'dropIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
              'lens-scan': 'lensScan 4s ease-in-out infinite',
              'star-spin': 'starSpin 10s linear infinite',
              'pulse-fade': 'pulseFade 2s infinite',
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-5px)' },
              },
              chairTip: {
                '0%, 100%': { transform: 'rotate(0deg)', transformOrigin: 'bottom center' },
                '20%': { transform: 'rotate(-8deg)', transformOrigin: 'bottom right' },
                '40%': { transform: 'rotate(0deg)', transformOrigin: 'bottom center' },
                '60%': { transform: 'rotate(8deg)', transformOrigin: 'bottom left' },
              },
              runWild: {
                '0%': { transform: 'translateX(0) scaleX(1)' },
                '10%': { transform: 'translateX(20px) scaleX(1)' },
                '15%': { transform: 'translateX(20px) scaleX(-1)' }, /* Turn */
                '30%': { transform: 'translateX(-50px) scaleX(-1)' }, /* Run left */
                '35%': { transform: 'translateX(-50px) scaleX(1)' }, /* Turn */
                '50%': { transform: 'translateX(10px) translateY(-5px) scaleX(1)' }, /* Jump */
                '60%': { transform: 'translateX(10px) translateY(0) scaleX(1)' },
                '80%': { transform: 'translateX(100px) scaleX(1)', opacity: '1' }, /* Run out */
                '85%': { transform: 'translateX(120px) scaleX(1)', opacity: '0' },
                '90%': { transform: 'translateX(-50px) scaleX(1)', opacity: '0' }, /* Reset pos hidden */
                '100%': { transform: 'translateX(0) scaleX(1)', opacity: '1' } /* Come back */
              },
              throwPaper: {
                '0%': { transform: 'translate(0, 0) scale(1)', opacity: '0' },
                '20%': { transform: 'translate(10px, -20px) scale(1)', opacity: '1' }, // Release point
                '100%': { transform: 'translate(80px, 20px) scale(0.5)', opacity: '0' }, // Land
              },
              headBob: {
                '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                '50%': { transform: 'translateY(2px) rotate(2deg)' }
              },
              writeHand: {
                '0%': { transform: 'translateX(0) rotate(0deg)' },
                '50%': { transform: 'translateX(3px) rotate(-5deg)' },
                '100%': { transform: 'translateX(0) rotate(0deg)' }
              },
              breathe: {
                 '0%, 100%': { transform: 'scale(1)' },
                 '50%': { transform: 'scale(1.02)' }
              },
              eyesMove: {
                '0%': { transform: 'translate(0,0)' },
                '40%': { transform: 'translate(-2px, 0)' },
                '60%': { transform: 'translate(2px, -1px)' },
                '80%': { transform: 'translate(0, 0)' }
              },
              growUp: {
                '0%': { transform: 'scaleY(0)', opacity: '0' },
                '100%': { transform: 'scaleY(1)', opacity: '1' }
              },
              bloom: {
                '0%': { transform: 'scale(0) rotate(-90deg)', opacity: '0' },
                '80%': { transform: 'scale(1.2) rotate(10deg)', opacity: '1' },
                '100%': { transform: 'scale(1) rotate(0deg)', opacity: '1' }
              },
              sway: {
                '0%, 100%': { transform: 'rotate(-3deg)' },
                '50%': { transform: 'rotate(3deg)' }
              },
              waterPour: {
                '0%, 100%': { transform: 'rotate(0deg)' },
                '50%': { transform: 'rotate(-15deg)' }
              },
              scaleWobble: {
                '0%, 100%': { transform: 'rotate(0deg)' },
                '25%': { transform: 'rotate(2deg)' },
                '75%': { transform: 'rotate(-2deg)' }
              },
              dropIn: {
                '0%': { transform: 'translateY(-50px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' }
              },
              lensScan: {
                '0%, 100%': { transform: 'translate(20px, 20px)' },
                '50%': { transform: 'translate(60px, 50px)' }
              },
              starSpin: {
                '0%': { transform: 'rotate(0deg)' },
                '100%': { transform: 'rotate(360deg)' }
              },
              pulseFade: {
                '0%, 100%': { opacity: '0.6' },
                '50%': { opacity: '0.3' }
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #f8fafc;
      }
      /* Custom Scrollbar for cleaner look */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.574.0",
    "react": "https://esm.sh/react@^19.2.4",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
